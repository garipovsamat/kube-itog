apiVersion: apps/v1
kind: Deployment
metadata:
  name: root-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: root-app
  template:
    metadata:
      labels:
        app: root-app
    spec:
      containers:
      - name: root-service
        image: ${{ vars.DOCKER_USERNAME }}/root-service:${{ github.ref_name }}
        ports:
        - containerPort: 8080
        env:
        - name: ROOT_APP_NAME
          valueFrom:
            configMapKeyRef:
              name: root-config
              key: ROOT_APP_NAME
        - name: ROOT_BIND_PORT
          valueFrom:
            configMapKeyRef:
              name: root-config
              key: ROOT_BIND_PORT
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-app
spec:
  replicas: 4
  selector:
    matchLabels:
      app: api-app
  template:
    metadata:
      labels:
        app: api-app
    spec:
      containers:
      - name: api-service
        image: samatgaripov/api-service:latest
        ports:
        - containerPort: 8081
        env:
        - name: API_APP_NAME
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: API_APP_NAME
        - name: API_BIND_PORT
          valueFrom:
            configMapKeyRef:
              name: api-config
              key: API_BIND_PORT
---
