name: Build Container
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      
      - name: Build and push root-service
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./cmd/root-service/Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKER_USERNAME }}/root-service:${{ github.ref_name }}
            ${{ vars.DOCKER_USERNAME }}/root-service:latest
      
      - name: Build and push api-service
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./cmd/api-service/Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKER_USERNAME }}/api-service:${{ github.ref_name }}
            ${{ vars.DOCKER_USERNAME }}/api-service:latest
      
      - name: Build and push info-service
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./cmd/info-service/Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKER_USERNAME }}/info-service:${{ github.ref_name }}
            ${{ vars.DOCKER_USERNAME }}/info-service:latest
      
      - name: Build and push login-service
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./cmd/login-service/Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKER_USERNAME }}/login-service:${{ github.ref_name }}
            ${{ vars.DOCKER_USERNAME }}/login-service:latest